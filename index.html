<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>LightRoom · Layer Study</title>
  <style>
    :root {
      --bg: #111214;
      --panel: #1e2024;
      --panel-2: #282c33;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #ff6b6b;
      --ref: #f59e0b;
      --user: #10b981;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin:0; height:100%; background:var(--bg); color:var(--text); overflow:hidden; touch-action:none; }
    body { font-family: Inter, system-ui, sans-serif; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

    .app { height:100%; position:relative; }
    .stage-wrap { position:absolute; inset:0; }
    #stage-root { width:100%; height:100%; }
    #grid-overlay { position:absolute; inset:0; display:none; pointer-events:none; }

    .topbar, .bottombar, .drawer {
      position:absolute; z-index:5; background:rgba(30,32,36,.95); border:1px solid #3a3f47; backdrop-filter: blur(8px);
      transition: opacity .25s ease;
    }
    .topbar { top:14px; left:14px; right:14px; border-radius:12px; padding:10px; display:grid; gap:8px; }
    .topbar-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .bottombar { left:50%; transform:translateX(-50%); bottom:14px; border-radius:14px; padding:8px; display:grid; gap:8px; min-width:min(640px, calc(100vw - 24px)); }
    .drawer { top:14px; right:14px; width:min(340px, calc(100vw - 28px)); border-radius:12px; padding:10px; max-height:calc(100vh - 28px); overflow:auto; }

    .ui-hidden .topbar, .ui-hidden .bottombar, .ui-hidden .drawer { opacity:0; pointer-events:none; }

    button, select, input[type="file"] { background:var(--panel-2); border:1px solid #464d58; color:var(--text); border-radius:9px; padding:8px 10px; }
    button { cursor:pointer; }
    button:disabled { opacity:.45; cursor:not-allowed; }
    .pill { border-radius:999px; }
    .mode.active-ref { border-color:var(--ref); box-shadow:0 0 0 1px var(--ref) inset; }
    .mode.active-user { border-color:var(--user); box-shadow:0 0 0 1px var(--user) inset; }
    .grow { flex:1; }
    .nudge-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
    .placeholder { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); color:var(--muted); font-size:20px; pointer-events:none; }
    .hidden { display:none; }
    label { font-size:12px; color:var(--muted); display:grid; gap:3px; }
    input[type="range"] { width:100%; }
  </style>
</head>
<body>
  <div class="app" id="app-root">
    <div class="stage-wrap">
      <main id="stage-root"></main>
      <svg id="grid-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="placeholder" class="placeholder">Загрузите референс</div>
    </div>

    <section class="topbar">
      <div class="topbar-row">
        <input id="ref-input" type="file" accept="image/*" class="grow" />
        <input id="user-input" type="file" accept="image/*" class="grow" />
        <button id="clear-all">Удалить всё</button>
      </div>
      <div class="topbar-row">
        <button id="target-ref" class="mode pill">Референс</button>
        <button id="target-user" class="mode pill">Рисунок</button>
        <button id="target-none" class="mode pill">Пусто</button>
        <button id="toggle-link" class="pill">Link: Off</button>
        <button id="toggle-user-visibility" class="pill">👁 Рисунок</button>
        <button id="toggle-grid" class="pill">Сетка</button>
        <button id="reset-state" class="pill">Reset</button>
      </div>
    </section>

    <section class="drawer" id="drawer">
      <h3 style="margin:0 0 8px;">Настройки слоя</h3>
      <label>Opacity <input id="opacity-slider" type="range" min="0" max="100" value="100" /></label>
      <label>Brightness <input id="brightness-slider" type="range" min="0" max="200" value="100" /></label>
      <label>Contrast <input id="contrast-slider" type="range" min="0" max="200" value="100" /></label>
    </section>

    <section class="bottombar">
      <div class="nudge-grid">
        <span></span><button id="nudge-up">⬆️</button><span></span>
        <button id="nudge-left">⬅️</button><button id="nudge-down">⬇️</button><button id="nudge-right">➡️</button>
        <button id="scale-down">➖</button><button id="rotate-plus">🔄</button><button id="scale-up">➕</button>
      </div>
    </section>
  </div>

  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
