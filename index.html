<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>LightRoom · Layer Study</title>
  <style>
    :root {
      --bg: #0c0d11;
      --surface: rgba(20, 22, 28, 0.84);
      --surface-2: rgba(34, 38, 48, 0.92);
      --stroke: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --muted: #9aa4b2;
      --accent: #fb7185;
      --ref: #f59e0b;
      --user: #22c55e;
      --shadow: 0 14px 45px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      background:
        radial-gradient(circle at 15% 15%, #1e293b 0%, transparent 34%),
        radial-gradient(circle at 85% 80%, #3b0764 0%, transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .app { position: relative; width: 100%; height: 100%; }
    .stage-wrap { position: absolute; inset: 0; }
    #stage-root { width: 100%; height: 100%; }
    #grid-overlay { position: absolute; inset: 0; display: none; pointer-events: none; }

    .glass {
      background: var(--surface);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px) saturate(130%);
    }

    .topbar {
      position: absolute;
      z-index: 4;
      left: 12px;
      right: 12px;
      top: 12px;
      border-radius: 18px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .topbar-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .bottombar {
      position: absolute;
      z-index: 4;
      left: 50%;
      transform: translateX(-50%);
      bottom: 14px;
      width: min(640px, calc(100vw - 24px));
      border-radius: 18px;
      padding: 10px;
    }

    .drawer {
      position: absolute;
      z-index: 4;
      right: 12px;
      top: 122px;
      width: min(320px, calc(100vw - 24px));
      border-radius: 18px;
      padding: 12px;
    }

    .ui-hidden .topbar,
    .ui-hidden .bottombar,
    .ui-hidden .drawer {
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: .25s ease;
    }

    h3 { margin: 0 0 10px; font-size: 14px; font-weight: 600; }

    input[type="file"],
    button,
    select {
      height: 38px;
      border-radius: 11px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: var(--surface-2);
      color: var(--text);
      padding: 0 10px;
    }

    input[type="file"] { padding-top: 8px; }
    button { cursor: pointer; font-weight: 600; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .danger { background: rgba(220, 38, 38, 0.3); }
    .grow { flex: 1; min-width: 150px; }
    .pill { border-radius: 999px; }
    .mode { min-width: 92px; }
    .mode.active-ref { border-color: var(--ref); box-shadow: 0 0 0 1px var(--ref) inset; color: #ffd18a; }
    .mode.active-user { border-color: var(--user); box-shadow: 0 0 0 1px var(--user) inset; color: #9af3c2; }

    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    input[type="range"] { width: 100%; accent-color: var(--accent); }

    .nudge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }

    .placeholder {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 19px;
      color: #c8d2e1;
      border: 1px dashed rgba(255, 255, 255, 0.38);
      background: rgba(15, 18, 25, 0.58);
      pointer-events: none;
    }

    .hidden { display: none; }

    @media (max-width: 900px) {
      .drawer { top: auto; bottom: 130px; width: calc(100vw - 24px); left: 12px; right: 12px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app-root">
    <div class="stage-wrap">
      <main id="stage-root"></main>
      <svg id="grid-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="placeholder" class="placeholder">Загрузите референс</div>
    </div>

    <section class="topbar glass">
      <div class="topbar-row">
        <input id="ref-input" type="file" accept="image/*" class="grow" />
        <input id="user-input" type="file" accept="image/*" class="grow" />
        <button id="clear-all" class="danger">Удалить всё</button>
      </div>
      <div class="topbar-row">
        <button id="target-ref" class="mode pill">Референс</button>
        <button id="target-user" class="mode pill">Рисунок</button>
        <button id="target-none" class="mode pill">Пусто</button>
        <button id="toggle-link" class="pill">Link: Off</button>
        <button id="toggle-user-visibility" class="pill">👁 Рисунок</button>
        <button id="toggle-grid" class="pill">Сетка</button>
        <button id="reset-state" class="pill">Reset</button>
      </div>
    </section>

    <section class="drawer glass" id="drawer">
      <h3>Настройки слоя</h3>
      <label>Opacity <input id="opacity-slider" type="range" min="0" max="100" value="100" /></label>
      <label>Brightness <input id="brightness-slider" type="range" min="0" max="200" value="100" /></label>
      <label>Contrast <input id="contrast-slider" type="range" min="0" max="200" value="100" /></label>
    </section>

    <section class="bottombar glass">
      <div class="nudge-grid">
        <span></span><button id="nudge-up">⬆️</button><span></span>
        <button id="nudge-left">⬅️</button><button id="nudge-down">⬇️</button><button id="nudge-right">➡️</button>
        <button id="scale-down">➖</button><button id="rotate-plus">🔄</button><button id="scale-up">➕</button>
      </div>
    </section>
  </div>

  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
