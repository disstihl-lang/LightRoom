<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArtRef · Konva Editor</title>
  <style>
    :root { --bg:#121212; --panel:#1f1f1f; --accent:#ff5f5f; --text:#f5f5f5; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,sans-serif; background:var(--bg); color:var(--text); }
    .app { display:grid; grid-template-columns: 290px 1fr; height:100vh; }
    .panel { background:var(--panel); padding:14px; overflow:auto; border-right:1px solid #333; }
    h1 { font-size:16px; margin:0 0 10px; }
    .group { margin:0 0 14px; padding:10px; border:1px solid #333; border-radius:10px; }
    .group h2 { margin:0 0 8px; font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:#bbb; }
    button, input, select { width:100%; margin:4px 0; }
    button { background:#2b2b2b; color:#fff; border:1px solid #444; border-radius:8px; padding:8px; cursor:pointer; }
    button.primary { background:var(--accent); border-color:var(--accent); }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    #stage-root { width:100%; height:100%; }
    .hint { font-size:12px; color:#a3a3a3; margin-top:8px; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1>ArtRef · Редактор</h1>

      <section class="group">
        <h2>Изображения</h2>
        <input id="ref-input" type="file" accept="image/*" />
        <input id="user-input" type="file" accept="image/*" />
        <div class="row">
          <button id="toggle-grid">Сетка</button>
          <label style="display:flex;align-items:center;gap:8px;font-size:12px;">
            <input id="link-images" type="checkbox" style="width:auto;margin:0;" />
            Связать слои
          </label>
        </div>
      </section>

      <section class="group">
        <h2>Настройка слоя</h2>
        <select id="active-image">
          <option value="image-ref">Референс</option>
          <option value="image-user">Рисунок</option>
        </select>
        <label>Opacity <input id="opacity-slider" type="range" min="0" max="100" value="100" /></label>
        <label>Brightness <input id="brightness-slider" type="range" min="0" max="200" value="100" /></label>
        <label>Contrast <input id="contrast-slider" type="range" min="0" max="200" value="100" /></label>
        <button id="reset-image-style">Сбросить фильтры</button>
        <div class="row">
          <button id="nudge-up">↑</button>
          <button id="nudge-down">↓</button>
        </div>
        <div class="row">
          <button id="nudge-left">←</button>
          <button id="nudge-right">→</button>
        </div>
      </section>

      <section class="group">
        <h2>Фигуры</h2>
        <div class="row">
          <button id="add-rect">Rect</button>
          <button id="add-circle">Circle</button>
        </div>
        <button id="add-line">Line</button>
      </section>

      <section class="group">
        <h2>История</h2>
        <div class="row">
          <button id="undo-btn">Undo</button>
          <button id="redo-btn">Redo</button>
        </div>
      </section>

      <section class="group">
        <h2>Проекты (IndexedDB)</h2>
        <input id="project-name" placeholder="Имя проекта" />
        <button class="primary" id="save-project">Сохранить проект</button>
        <select id="projects-list" size="5"></select>
        <div class="row">
          <button id="load-project">Загрузить</button>
          <button id="delete-project">Удалить</button>
        </div>
      </section>

      <p class="hint">Клик для выделения. Shift+клик — мультивыбор. Перетаскивание/масштаб/поворот через Transformer.</p>
    </aside>
    <main id="stage-root"></main>
  </div>

  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
